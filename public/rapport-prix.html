<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pénétration prix — Relevés concurrents — TB Reporting</title>
  <script src="/auth-client.js"></script>
  <script>AUTH.require("dashboard"); AUTH.installFetchInterceptor();</script>
  <script src="/theme.js"></script>
  <script src="/utils.js"></script>
  <style>
    :root {
      --bg:#0f1117; --surface:#1a1d2e; --surface2:#1e2235; --border:#2a2d3e;
      --text:#e2e8f0; --muted:#8892a4; --blue:#2196F3; --green:#4CAF50;
      --orange:#FF9800; --red:#F44336; --purple:#9C27B0; --radius:10px; --gap:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
    html.embedded header h1, html.embedded header .nav-link { display: none; }
    html.embedded header { padding:6px 10px; }
    html.embedded header #last-update { display:none; }

    header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
    header h1{font-size:1rem;font-weight:600;white-space:nowrap}
    .nav-link{color:var(--muted);font-size:.78rem;text-decoration:none;padding:4px 10px;
      border:1px solid var(--border);border-radius:6px;white-space:nowrap}
    .nav-link:hover{color:var(--text);border-color:var(--blue)}
    .spacer{flex:1}
    .hdr-right{display:flex;align-items:center;gap:8px}
    #last-update{font-size:.72rem;color:var(--muted)}
    #status-dot{width:9px;height:9px;border-radius:50%;background:#666;flex-shrink:0}
    #status-dot.ok{background:var(--green)} #status-dot.err{background:var(--red)}
    #refresh-btn{background:var(--blue);border:none;color:#fff;padding:5px 12px;
      border-radius:6px;font-size:.8rem;cursor:pointer}
    #refresh-btn:disabled{opacity:.5;cursor:not-allowed}
    select,input[type=date],input[type=number]{background:var(--bg);color:var(--text);
      border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:.8rem;cursor:pointer}
    input[type=date]{cursor:text}
    input[type=number]{width:80px;cursor:text}
    .ms-wrap{position:relative;display:inline-flex}
    .ms-btn{background:var(--bg);color:var(--text);border:1px solid var(--border);
      border-radius:6px;padding:5px 10px;font-size:.8rem;cursor:pointer;
      display:inline-flex;align-items:center;gap:6px;max-width:230px}
    .ms-btn span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ms-btn:hover,.ms-btn.open{border-color:var(--blue)}
    .ms-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(33,150,243,.08)}
    .ms-btn::after{content:'▾';font-size:.65rem;color:var(--muted);flex-shrink:0}
    .ms-dd{position:absolute;top:calc(100% + 4px);left:0;
      min-width:220px;max-height:320px;overflow-y:auto;
      background:var(--surface);border:1px solid var(--border);
      border-radius:6px;padding:4px 0;z-index:100;
      box-shadow:0 6px 18px rgba(0,0,0,.35);display:none}
    .ms-dd.open{display:block}
    .ms-dd label{display:flex;align-items:center;gap:8px;padding:5px 12px;
      font-size:.78rem;cursor:pointer;color:var(--text)}
    .ms-dd label:hover{background:var(--surface2)}
    .ms-dd label.all-opt{color:var(--muted);font-style:italic;
      border-bottom:1px solid var(--border);margin-bottom:3px;padding-bottom:6px}
    .ms-dd input[type=checkbox]{accent-color:var(--blue);cursor:pointer}
    .fld-grp{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;color:var(--muted)}
    .container{max-width:1500px;margin:0 auto;padding:var(--gap)}
    .error-banner{background:#2a1a1a;border:1px solid var(--red);border-radius:var(--radius);
      padding:10px 14px;color:var(--red);font-size:.85rem;margin-bottom:var(--gap);display:none}
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--gap);
      margin-bottom:var(--gap)}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:12px 14px}
    .kpi-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .kpi-value{font-size:1.4rem;font-weight:700;margin-top:4px;color:var(--text)}
    .kpi-sub{font-size:.72rem;color:var(--muted);margin-top:3px}
    .kpi-sub.pos{color:var(--green)} .kpi-sub.neg{color:var(--red)}
    .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      margin-bottom:var(--gap);overflow:hidden}
    .section-header{display:flex;align-items:center;gap:10px;padding:12px 16px;
      background:var(--surface2);border-bottom:1px solid var(--border)}
    .section-title{font-size:.9rem;font-weight:700}
    .section-sub{font-size:.75rem;color:var(--muted);margin-left:auto}
    .tree-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .tree-table th,.tree-table td{padding:6px 10px;border-bottom:1px solid var(--border);text-align:right}
    .tree-table th{font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;
      letter-spacing:.04em;background:var(--surface2);position:sticky;top:0}
    .tree-table th:first-child,.tree-table td.lbl{text-align:left}
    .lbl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:420px}
    .lvl-1{background:rgba(33,150,243,.07)}
    .lvl-1 td.lbl{padding-left:10px;font-weight:700;color:var(--text)}
    .lvl-2 td.lbl{padding-left:30px;font-weight:600;color:#cbd5e1}
    .lvl-3 td.lbl{padding-left:50px;color:#a8b3c7}
    .lvl-1 td{border-top:2px solid var(--border)}
    .toggler{display:inline-block;width:14px;text-align:center;cursor:pointer;
      color:var(--muted);user-select:none}
    .toggler:hover{color:var(--blue)}
    .val-main{font-weight:600}
    .val-pct{font-size:.72rem;color:var(--muted);margin-left:4px}
    .val-pct.good{color:var(--green)}
    .val-pct.avg{color:var(--orange)}
    .val-pct.bad{color:var(--red)}
    .muted{color:var(--muted)}
    .gaps-card{padding:0}
    .gaps-row{border-top:1px solid var(--border)}
    .gaps-row:first-child{border-top:none}
    .gaps-head{padding:10px 16px;display:flex;align-items:center;gap:10px;
      cursor:pointer;background:var(--surface2)}
    .gaps-head:hover{background:#272b40}
    .gaps-head .name{font-weight:700;font-size:.85rem}
    .gaps-head .count{color:var(--orange);font-size:.78rem;margin-left:auto}
    .gaps-body{padding:8px 16px 12px 36px;font-size:.78rem;display:none;color:#cbd5e1}
    .gaps-body.open{display:block}
    .gaps-body li{padding:3px 0;list-style:disc;margin-left:20px}
    .gaps-body .cli-cmd{color:var(--muted);font-size:.7rem;margin-left:6px}
    .pricing-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:6px}
    .pricing-table th,.pricing-table td{padding:5px 8px;border-bottom:1px dashed var(--border);text-align:right}
    .pricing-table th{text-align:left;color:var(--muted);font-weight:700;text-transform:uppercase;
      letter-spacing:.04em;font-size:.65rem}
    .pricing-table td:first-child,.pricing-table th:first-child{text-align:left}
    .skeleton{animation:pulse 1.4s ease-in-out infinite;background:var(--border);border-radius:4px;display:inline-block;height:1em;width:60px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  </style>
  <script>if(new URLSearchParams(location.search).get('embed')==='1')document.documentElement.classList.add('embedded');</script>
</head>
<body>

<header>
  <h1>💰 Prix concurrents — pénétration</h1>
  <a class="nav-link" href="/tb-reporting.html">← TB Reporting</a>
  <a class="nav-link" href="/dashboard.html">📋 Rapports</a>
  <div class="fld-grp">📅 <input type="date" id="sel-date-debut"> → <input type="date" id="sel-date-fin"></div>
  <div class="ms-wrap" id="ms-secteurs"><button class="ms-btn" type="button"><span>Tous les secteurs</span></button><div class="ms-dd"></div></div>
  <div class="ms-wrap" id="ms-marques"><button class="ms-btn" type="button"><span>Toutes les marques</span></button><div class="ms-dd"></div></div>
  <div class="ms-wrap" id="ms-familles"><button class="ms-btn" type="button"><span>Toutes les familles</span></button><div class="ms-dd"></div></div>
  <div class="ms-wrap" id="ms-reps"><button class="ms-btn" type="button"><span>Tous les commerciaux</span></button><div class="ms-dd"></div></div>
  <select id="sel-cliactif" title="Clients à inclure">
    <option value="O" selected>Clients actifs</option>
    <option value="N">Clients inactifs</option>
    <option value="all">Tous les clients</option>
  </select>
  <div class="fld-grp" title="TVA pour ramener les prix relevés (saisis TTC) en HT">
    TVA <input type="number" id="sel-tva" min="0" max="100" step="0.5" value="8.5"> %
  </div>
  <div class="spacer"></div>
  <div class="hdr-right">
    <span id="status-dot"></span>
    <span id="last-update"></span>
    <button id="refresh-btn" onclick="closeAllDropdowns(); load();">↻ Actualiser</button>
    <button id="excel-btn" onclick="closeAllDropdowns(); exportExcel();" title="Excel" style="background:#1b5e20;border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:.8rem;cursor:pointer">📊 Excel</button>
    <button id="pdf-btn" onclick="closeAllDropdowns(); exportPDF();" title="PDF" style="background:#b71c1c;border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:.8rem;cursor:pointer">🖨️ PDF</button>
  </div>
</header>

<div class="container">
  <div id="error-banner" class="error-banner"></div>
  <div id="kpis" class="kpi-row"></div>
  <div id="tree-section" class="section"></div>
  <div id="gaps-article-section"></div>
  <div id="gaps-client-section"></div>
  <div id="pricing-section"></div>
</div>

<script>
const API = '/api/prix';
const STORAGE_KEY = 'rapport-prix:state';

const URL_PARAMS = new URLSearchParams(location.search);
const URL_DBS    = URL_PARAMS.get('dbs')    || '';
const URL_CONNID = URL_PARAMS.get('connId') || '';
function applyDbParam(params){
  if (URL_DBS)    params.set('dbs', URL_DBS);
  if (URL_CONNID) params.set('connId', URL_CONNID);
  return params;
}
function dbQs(){
  const p = new URLSearchParams(); applyDbParam(p);
  const s = p.toString(); return s ? '?' + s : '';
}
function updateDbBadge(db){
  if (!db) return;
  const el = document.getElementById('db-info-badge'); if (!el) return;
  const parts = [];
  if (db.database) parts.push(`🗄️ ${db.database}`);
  if (db.societe)  parts.push(db.societe);
  if (parts.length) {
    el.textContent = parts.join(' · ');
    el.title = db.societe ? `Base : ${db.database}\nSociété : ${db.societe}` : `Base : ${db.database || ''}`;
  }
}

let SELECTED_SECTEURS = new Set();
let SELECTED_MARQUES  = new Set();
let SELECTED_FAMILLES = new Set();
let SELECTED_REPS     = new Set();
let LAST_DATA = null;

function qs(id){ return document.getElementById(id); }
function fmt(n,dec=0){
  if(n===null||n===undefined||isNaN(n)) return '—';
  return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:dec,maximumFractionDigits:dec}).format(n);
}
function fmtEur(n,dec=0){ return n===null||n===undefined||isNaN(n) ? '—' : fmt(n,dec)+' €'; }
function fmtPct(n,dec=1){ return n===null||n===undefined||isNaN(n) ? '—' : (n>=0?'+':'')+fmt(n,dec)+' %'; }
function escH(s){ const d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }

function saveState(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      date_debut: qs('sel-date-debut')?.value || '',
      date_fin:   qs('sel-date-fin')?.value   || '',
      cliactif:   qs('sel-cliactif')?.value   || '',
      tva:        qs('sel-tva')?.value        || '',
      secteurs: Array.from(SELECTED_SECTEURS),
      marques:  Array.from(SELECTED_MARQUES),
      familles: Array.from(SELECTED_FAMILLES),
      reps:     Array.from(SELECTED_REPS),
    }));
  } catch {}
}
function loadState(){
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (!s) return null;
    (s.secteurs || []).forEach(x => SELECTED_SECTEURS.add(x));
    (s.marques  || []).forEach(x => SELECTED_MARQUES.add(x));
    (s.familles || []).forEach(x => SELECTED_FAMILLES.add(x));
    (s.reps     || []).forEach(x => SELECTED_REPS.add(x));
    return s;
  } catch { return null; }
}

function setupMS(wrapId, items, selectedSet, btnLabelAll, onChange){
  const wrap = qs(wrapId);
  const btn  = wrap.querySelector('.ms-btn');
  const dd   = wrap.querySelector('.ms-dd');
  function refreshBtn(){
    const span = btn.querySelector('span');
    if(selectedSet.size===0){ span.textContent = btnLabelAll; btn.classList.remove('active'); }
    else { btn.classList.add('active');
      span.textContent = selectedSet.size===1 ? Array.from(selectedSet)[0] : `${selectedSet.size} sélectionnés`; }
  }
  function render(){
    let h = `<label class="all-opt"><input type="checkbox" id="${wrapId}-all"${selectedSet.size===0?' checked':''}> Tous</label>`;
    items.forEach(it => {
      const checked = selectedSet.has(String(it.id)) ? ' checked' : '';
      h += `<label><input type="checkbox" value="${escH(it.id)}"${checked}> ${escH(it.label)}</label>`;
    });
    dd.innerHTML = h;
    dd.querySelector(`#${wrapId}-all`).onchange = (e) => {
      if(e.target.checked){ selectedSet.clear(); render(); refreshBtn(); onChange&&onChange(); }
      else if(selectedSet.size===0){ e.target.checked = true; }
    };
    dd.querySelectorAll('input[type=checkbox][value]').forEach(cb => {
      cb.onchange = () => {
        if(cb.checked) selectedSet.add(cb.value); else selectedSet.delete(cb.value);
        const allCb = dd.querySelector(`#${wrapId}-all`);
        if(allCb) allCb.checked = selectedSet.size===0;
        refreshBtn(); onChange&&onChange();
      };
    });
  }
  btn.onclick = (e) => { e.stopPropagation(); dd.classList.toggle('open'); btn.classList.toggle('open'); };
  refreshBtn(); render();
}
function closeAllDropdowns(){
  document.querySelectorAll('.ms-dd.open').forEach(o => o.classList.remove('open'));
  document.querySelectorAll('.ms-btn.open').forEach(o => o.classList.remove('open'));
}
document.addEventListener('click', (e) => {
  if (e.target.closest('.ms-dd')) return;
  if (e.target.closest('.ms-btn')) return;
  closeAllDropdowns();
});

async function initFilters(){
  const data = await fetch(`${API}/filters${dbQs()}`).then(r => r.json());

  // Bornes dates : par défaut 90 derniers jours, mais on limite par les bornes relevés
  const today = new Date();
  const dDef1 = today.toISOString().slice(0,10);
  const d0 = new Date(today); d0.setDate(d0.getDate() - 90);
  const dDef0 = d0.toISOString().slice(0,10);
  qs('sel-date-debut').value = dDef0;
  qs('sel-date-fin').value   = dDef1;
  if (data.bornes?.min_date) qs('sel-date-debut').min = data.bornes.min_date;
  if (data.bornes?.max_date) qs('sel-date-fin').max   = data.bornes.max_date;

  setupMS('ms-secteurs', (data.secteurs||[]).map(s => ({ id:s, label:s })), SELECTED_SECTEURS, 'Tous les secteurs', load);
  setupMS('ms-marques',  (data.marques||[]).map(m  => ({ id:m, label:m })), SELECTED_MARQUES,  'Toutes les marques', load);
  setupMS('ms-familles', (data.familles||[]).map(f => ({ id:f, label:f })), SELECTED_FAMILLES, 'Toutes les familles', load);
  setupMS('ms-reps',     (data.commerciaux||[]).map(c => ({ id:c.TIRID, label:c.nom })), SELECTED_REPS, 'Tous les commerciaux', load);

  qs('sel-cliactif').onchange    = load;
  qs('sel-tva').onchange         = load;
  qs('sel-date-debut').onchange  = load;
  qs('sel-date-fin').onchange    = load;

  const p = new URLSearchParams(location.search);
  if(p.get('secteurs')) p.get('secteurs').split(',').forEach(s => SELECTED_SECTEURS.add(s));
  if(p.get('marques'))  p.get('marques').split(',').forEach(m => SELECTED_MARQUES.add(m));
  if(p.get('familles')) p.get('familles').split(',').forEach(f => SELECTED_FAMILLES.add(f));
  if(p.get('repid'))    p.get('repid').split(',').forEach(r => SELECTED_REPS.add(r));
  if(p.get('cliactif')) qs('sel-cliactif').value = p.get('cliactif');
  if(p.get('tva'))      qs('sel-tva').value      = p.get('tva');
  if(p.get('date_debut')) qs('sel-date-debut').value = p.get('date_debut');
  if(p.get('date_fin'))   qs('sel-date-fin').value   = p.get('date_fin');

  const saved = loadState();
  if (saved) {
    if (saved.date_debut && !p.get('date_debut')) qs('sel-date-debut').value = saved.date_debut;
    if (saved.date_fin   && !p.get('date_fin'))   qs('sel-date-fin').value   = saved.date_fin;
    if (saved.cliactif   && !p.get('cliactif'))   qs('sel-cliactif').value   = saved.cliactif;
    if (saved.tva        && !p.get('tva'))        qs('sel-tva').value        = saved.tva;
    document.querySelectorAll('.ms-btn').forEach(b => {
      const wrap = b.closest('.ms-wrap'); const dd = wrap?.querySelector('.ms-dd'); if (!dd) return;
      const checks = dd.querySelectorAll('input[type=checkbox][value]');
      let anyChecked = false;
      checks.forEach(cb => {
        let set = null;
        if (wrap.id === 'ms-secteurs') set = SELECTED_SECTEURS;
        else if (wrap.id === 'ms-marques')  set = SELECTED_MARQUES;
        else if (wrap.id === 'ms-familles') set = SELECTED_FAMILLES;
        else if (wrap.id === 'ms-reps')     set = SELECTED_REPS;
        if (set && set.has(cb.value)) { cb.checked = true; anyChecked = true; }
      });
      const allCb = dd.querySelector('input.all-opt, [id$="-all"]');
      if (allCb) allCb.checked = !anyChecked;
      const span = b.querySelector('span');
      let set = null, labelAll = '';
      if (wrap.id === 'ms-secteurs') { set = SELECTED_SECTEURS; labelAll = 'Tous les secteurs'; }
      else if (wrap.id === 'ms-marques')  { set = SELECTED_MARQUES;  labelAll = 'Toutes les marques'; }
      else if (wrap.id === 'ms-familles') { set = SELECTED_FAMILLES; labelAll = 'Toutes les familles'; }
      else if (wrap.id === 'ms-reps')     { set = SELECTED_REPS;     labelAll = 'Tous les commerciaux'; }
      if (set && span) {
        if (set.size === 0) { span.textContent = labelAll; b.classList.remove('active'); }
        else { b.classList.add('active'); span.textContent = set.size === 1 ? Array.from(set)[0] : `${set.size} sélectionnés`; }
      }
    });
  }
}

function skeleton(){
  qs('kpis').innerHTML = Array.from({length:5}).map(() =>
    `<div class="kpi-card"><div class="kpi-label"><span class="skeleton"></span></div>
      <div class="kpi-value"><span class="skeleton" style="width:90px;height:1.4rem"></span></div></div>`).join('');
  qs('tree-section').innerHTML = '';
  qs('gaps-article-section').innerHTML = '';
  qs('gaps-client-section').innerHTML = '';
  qs('pricing-section').innerHTML = '';
}

function renderKpis(data){
  const k = data.kpis || {};
  const pctAcheteurs = k.totalClientsPortefeuille > 0
    ? (k.nbAcheteurs / k.totalClientsPortefeuille * 100) : 0;
  qs('kpis').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Clients portefeuille</div>
      <div class="kpi-value">${fmt(k.totalClientsPortefeuille)}</div>
      <div class="kpi-sub">${data.periode?.date_debut} → ${data.periode?.date_fin}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Acheteurs (période)</div>
      <div class="kpi-value">${fmt(k.nbAcheteurs)}</div>
      <div class="kpi-sub">${fmt(pctAcheteurs,1)} % du portefeuille</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">CA réalisé HT</div>
      <div class="kpi-value">${fmtEur(k.ca)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Articles avec relevé prix</div>
      <div class="kpi-value">${fmt(k.nbArticlesAvecRelevePrix)}</div>
      <div class="kpi-sub">${fmt(k.nbRelevés)} relevé(s) résolu(s)</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Articles "à risque"</div>
      <div class="kpi-value ${k.nbArticlesARisque>0?'':'muted'}">${fmt(k.nbArticlesARisque)}</div>
      <div class="kpi-sub">≥ 5 % plus cher que la concurrence</div>
    </div>
  `;
}

function pctClass(p){
  if(p===null||p===undefined) return '';
  if(p>=50) return 'good';
  if(p>=20) return 'avg';
  return 'bad';
}

function renderTree(data){
  const tree = data.treeBySecteur || [];
  const sec = qs('tree-section');
  if (!tree.length) {
    sec.innerHTML = `<div class="section-header"><span class="section-title">📂 Hiérarchie secteur × marque × article</span></div>
      <div style="padding:20px;text-align:center;color:var(--muted)">Aucune donnée sur la période.</div>`;
    return;
  }

  let html = `<div class="section-header">
    <span class="section-title">📂 Hiérarchie secteur → marque → article</span>
    <span class="section-sub">${tree.length} secteur(s) · TVA ${data.tva} %</span>
  </div>
  <div style="overflow-x:auto"><table class="tree-table"><thead><tr>
    <th>Niveau</th><th>Clients</th><th>Acheteurs</th><th>CA HT</th>
    <th>Mon PV HT</th><th>Concurrent moy HT</th><th>Min / Max</th>
    <th>Écart</th><th>Relevés</th><th>Dernier relevé</th>
  </tr></thead><tbody>`;

  tree.forEach((s, si) => {
    const sid = `sec-${si}`;
    const pctAch = s.totalClients > 0 ? (s.nbBuyers / s.totalClients * 100) : null;
    html += `<tr class="lvl-1" data-row="${sid}"><td class="lbl"><span class="toggler" data-toggle="${sid}">▾</span> ${escH(s.label)}</td>
      <td>${fmt(s.totalClients)}</td>
      <td>${fmt(s.nbBuyers)}${pctAch!==null?` <span class="val-pct ${pctClass(pctAch)}">${fmt(pctAch,1)} %</span>`:''}</td>
      <td>${fmtEur(s.ca)}</td>
      <td colspan="4" class="muted" style="text-align:left;padding-left:20px">${s.children.length} marque(s)</td>
      <td>${fmt(s.nb_releves)}</td><td></td></tr>`;
    s.children.forEach((m, mi) => {
      const mid = `mar-${si}-${mi}`;
      html += `<tr class="lvl-2" data-row="${mid}" data-parent="${sid}"><td class="lbl"><span class="toggler" data-toggle="${mid}">▾</span> ${escH(m.label)}</td>
        <td></td>
        <td>${fmt(m.nbBuyers)}</td>
        <td>${fmtEur(m.ca)}</td>
        <td colspan="4" class="muted" style="text-align:left;padding-left:20px">${m.children.length} article(s)</td>
        <td>${fmt(m.nb_releves)}</td><td></td></tr>`;
      m.children.forEach((a) => {
        const ecartCls = a.ecart_pct === null || a.ecart_pct === undefined ? '' :
          (a.ecart_pct >= 5 ? 'val-pct bad' : (a.ecart_pct <= -2 ? 'val-pct good' : 'val-pct avg'));
        const minMax = (a.prix_concurrent_min_ht !== null && a.prix_concurrent_max_ht !== null && a.prix_concurrent_min_ht !== undefined)
          ? `${fmtEur(a.prix_concurrent_min_ht,2)} / ${fmtEur(a.prix_concurrent_max_ht,2)}` : '—';
        html += `<tr class="lvl-3" data-parent="${mid}"><td class="lbl">${escH(a.code)} — <span class="muted">${escH(a.designation||'')}</span></td>
          <td></td>
          <td>${fmt(a.nbBuyers)}</td>
          <td>${fmtEur(a.ca)}</td>
          <td>${fmtEur(a.pv_moyen_ht,2)}</td>
          <td>${fmtEur(a.prix_concurrent_moy_ht,2)}</td>
          <td>${minMax}</td>
          <td>${a.ecart_pct === null || a.ecart_pct === undefined ? '—' : `<span class="${ecartCls}">${fmtPct(a.ecart_pct)}</span>`}</td>
          <td>${fmt(a.nb_releves)}${a.nb_clients_releves>0?` <span class="muted">(${a.nb_clients_releves} cli)</span>`:''}</td>
          <td class="muted">${a.dernier_releve || '—'}</td></tr>`;
      });
    });
  });

  html += '</tbody></table></div>';
  sec.className = 'section';
  sec.innerHTML = html;

  // Toggle : cache uniquement les enfants directs (un seul niveau).
  // Pour cacher la sous-arbre entière, on cache tous les descendants en bloc.
  sec.querySelectorAll('[data-toggle]').forEach(t => {
    t.onclick = (e) => {
      e.stopPropagation();
      const id = t.dataset.toggle;
      const opening = t.textContent === '▸';
      t.textContent = opening ? '▾' : '▸';
      // Collecte récursive des IDs sous ce nœud
      const toToggle = new Set();
      function collect(parentId) {
        sec.querySelectorAll(`[data-parent="${parentId}"]`).forEach(row => {
          toToggle.add(row);
          const childId = row.dataset.row;
          if (childId) collect(childId);
        });
      }
      collect(id);
      toToggle.forEach(row => row.style.display = opening ? '' : 'none');
    };
  });
}

function renderGapsByArticle(data){
  const sec = qs('gaps-article-section');
  const list = data.gapsByArticle || [];
  if (!list.length) { sec.innerHTML = ''; return; }
  let html = `<div class="section">
    <div class="section-header">
      <span class="section-title">🚫 Gaps articles — clients du secteur qui n'achètent pas l'article</span>
      <span class="section-sub">${list.length} couple(s) secteur × marque</span>
    </div>
    <div class="gaps-card">`;
  list.forEach((entry, ei) => {
    entry.articles.forEach((art, ai) => {
      const id = `gap-art-${ei}-${ai}`;
      const tot = art.nbBuyers + art.nbAbsents;
      const pctAbs = tot > 0 ? art.nbAbsents / tot * 100 : 0;
      html += `<div class="gaps-row">
        <div class="gaps-head" onclick="document.getElementById('${id}').classList.toggle('open')">
          <span class="name">${escH(entry.secteur)} · ${escH(entry.marque)} · ${escH(art.code)} — ${escH(art.designation||'')}</span>
          <span class="count">${art.nbAbsents} absent(s) / ${tot} (${fmt(pctAbs,1)} %)</span>
        </div>
        <ul class="gaps-body" id="${id}">${
          art.clients.map(c => `<li>${escH(c.nom)} <span class="cli-cmd">${escH(c.code)} · ${escH(c.commercial||'sans commercial')}</span></li>`).join('')
        }</ul>
      </div>`;
    });
  });
  html += `</div></div>`;
  sec.innerHTML = html;
}

        <span class="name">${escH(art.code||'(sans code)')} — ${escH(art.designation||'')} <span class="muted" style="font-weight:400">· ${escH(art.marque||'')}</span></span>

          <th>Client</th><th>Secteur</th><th>Date</th>
          <th>Prix relevé HT</th><th>Promo HT</th><th>Mon PV chez client</th><th>Écart %</th>
          <th>Marque relevée</th><th>Match</th>
        </tr></thead><tbody>${
          art.clients.map(c => {
            const ecartCls = c.ecart_pct === null || c.ecart_pct === undefined ? '' :
              (c.ecart_pct >= 5 ? 'val-pct bad' : (c.ecart_pct <= -2 ? 'val-pct good' : 'val-pct avg'));
            return `<tr>
              <td>${escH(c.client_nom||'')}</td>
              <td class="muted">${escH(c.secteur||'')}</td>
              <td class="muted">${escH(c.date_releve||'')}</td>
              <td>${fmtEur(c.prix_releve_ht,2)}</td>
              <td class="muted">${fmtEur(c.prix_promo_ht,2)}</td>
              <td>${c.mon_pv_ht===null?'—':fmtEur(c.mon_pv_ht,2)}</td>
              <td>${c.ecart_pct===null||c.ecart_pct===undefined?'—':`<span class="${ecartCls}">${fmtPct(c.ecart_pct)}</span>`}</td>
              <td class="muted">${escH(c.marque_releve||'')}</td>
              <td class="muted">${escH(c.match_type||'')}</td>
            </tr>`;
          }).join('')
        }</tbody></table>
      </div>
    </div>`;
  });
  html += `</div></div>`;
  sec.innerHTML = html;
}

let _firstLoadDone = false;
async function load(){
  const btn = qs('refresh-btn'), dot = qs('status-dot'), banner = qs('error-banner');
  btn.disabled = true; btn.textContent = '…';
  if (!_firstLoadDone) skeleton(); else dot.className = '';

  const params = new URLSearchParams();
  const d0 = qs('sel-date-debut').value, d1 = qs('sel-date-fin').value;
  if (d0) params.set('date_debut', d0);
  if (d1) params.set('date_fin', d1);
  if (SELECTED_SECTEURS.size) params.set('secteurs', Array.from(SELECTED_SECTEURS).join(','));
  if (SELECTED_MARQUES.size)  params.set('marques',  Array.from(SELECTED_MARQUES).join(','));
  if (SELECTED_FAMILLES.size) params.set('familles', Array.from(SELECTED_FAMILLES).join(','));
  if (SELECTED_REPS.size)     params.set('repid',    Array.from(SELECTED_REPS).join(','));
  const cli = qs('sel-cliactif').value; if (cli) params.set('cliactif', cli);
  const tva = qs('sel-tva').value;      if (tva) params.set('tva', tva);
  applyDbParam(params);

  saveState();
  try {
    const data = await fetch(`${API}/penetration?${params}`).then(r => r.json());
    if (data.error) throw new Error(data.error);
    LAST_DATA = data;
    updateDbBadge(data.db);
    renderKpis(data);
    renderTree(data);
    renderGapsByArticle(data);
    renderGapsByClient(data);
    renderPricing(data);
    _firstLoadDone = true;
    dot.className = 'ok';
    banner.style.display = 'none';
    qs('last-update').textContent = new Date().toLocaleTimeString('fr-FR');
  } catch (err) {
    dot.className = 'err';
    banner.style.display = 'block';
    banner.textContent = 'Erreur : ' + err.message;
    ['kpis','tree-section','gaps-article-section','gaps-client-section','pricing-section']
      .forEach(id => qs(id).innerHTML = '');
  } finally {
    btn.disabled = false; btn.textContent = '↻ Actualiser';
  }
}

function buildExportParams(){
  const params = new URLSearchParams();
  const d0 = qs('sel-date-debut').value, d1 = qs('sel-date-fin').value;
  if (d0) params.set('date_debut', d0);
  if (d1) params.set('date_fin', d1);
  if (SELECTED_SECTEURS.size) params.set('secteurs', Array.from(SELECTED_SECTEURS).join(','));
  if (SELECTED_MARQUES.size)  params.set('marques',  Array.from(SELECTED_MARQUES).join(','));
  if (SELECTED_FAMILLES.size) params.set('familles', Array.from(SELECTED_FAMILLES).join(','));
  if (SELECTED_REPS.size)     params.set('repid',    Array.from(SELECTED_REPS).join(','));
  const cli = qs('sel-cliactif').value; if (cli) params.set('cliactif', cli);
  const tva = qs('sel-tva').value;      if (tva) params.set('tva', tva);
  applyDbParam(params);
  return params;
}

async function exportExcel(){
  const btn = qs('excel-btn'); const prev = btn.textContent;
  btn.disabled = true; btn.textContent = '📊 …';
  try {
    const res = await fetch(`${API}/penetration/excel?${buildExportParams()}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `penetration-prix-${new Date().toISOString().slice(0,10)}.xlsx`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  } catch(e) { alert('Erreur export Excel : ' + e.message); }
  finally { btn.disabled = false; btn.textContent = prev; }
}

async function exportPDF(){
  const btn = qs('pdf-btn'); const prev = btn.textContent;
  btn.disabled = true; btn.textContent = '🖨️ …';
  try {
    const params = buildExportParams();
    const token = AUTH.getToken && AUTH.getToken();
    if (token) params.set('token', token);
    window.open(`${API}/penetration/pdf?${params}`, '_blank');
  } catch(e) { alert('Erreur PDF : ' + e.message); }
  finally { btn.disabled = false; btn.textContent = prev; }
}

(async () => {
  await initFilters();
  load();
})().catch(e => {
  qs('error-banner').textContent = 'Erreur init : ' + e.message;
  qs('error-banner').style.display = 'block';
});
