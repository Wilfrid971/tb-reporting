<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapport CA Global — TB Reporting</title>
  <script src="/auth-client.js"></script>
  <script>AUTH.require("dashboard"); AUTH.installFetchInterceptor();</script>
  <script src="/theme.js"></script>
  <script src="/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0f1117; --surface:#1a1d2e; --surface2:#1e2235; --border:#2a2d3e;
      --text:#e2e8f0; --muted:#8892a4; --blue:#2196F3; --green:#4CAF50;
      --orange:#FF9800; --red:#F44336; --radius:10px; --gap:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
    html.embedded header{display:none}

    header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
    header h1{font-size:1rem;font-weight:600;white-space:nowrap}
    .nav-link{color:var(--muted);font-size:.78rem;text-decoration:none;padding:4px 10px;
      border:1px solid var(--border);border-radius:6px;white-space:nowrap}
    .nav-link:hover{color:var(--text);border-color:var(--blue)}
    .spacer{flex:1}
    .hdr-right{display:flex;align-items:center;gap:8px}
    #last-update{font-size:.72rem;color:var(--muted)}
    #status-dot{width:9px;height:9px;border-radius:50%;background:#666;flex-shrink:0}
    #status-dot.ok{background:var(--green)} #status-dot.err{background:var(--red)}
    #refresh-btn{background:var(--blue);border:none;color:#fff;padding:5px 12px;
      border-radius:6px;font-size:.8rem;cursor:pointer}
    #refresh-btn:disabled{opacity:.5;cursor:not-allowed}
    select{background:var(--bg);color:var(--text);border:1px solid var(--border);
      border-radius:6px;padding:5px 10px;font-size:.8rem;cursor:pointer}
    .hdr-check{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted);
      cursor:pointer;white-space:nowrap;user-select:none}
    .hdr-check input{accent-color:var(--blue);cursor:pointer}

    /* ── Multi-select commercial ── */
    .ms-rep{position:relative;display:inline-block}
    .ms-rep-btn{background:var(--bg);color:var(--text);border:1px solid var(--border);
      border-radius:6px;padding:5px 10px;font-size:.8rem;cursor:pointer;
      display:flex;align-items:center;gap:8px;white-space:nowrap;min-width:170px}
    .ms-rep-btn:hover{border-color:var(--blue)}
    .ms-rep-btn::after{content:'▾';font-size:.65rem;color:var(--muted);margin-left:auto}
    .ms-rep-dd{position:absolute;top:calc(100% + 4px);left:0;min-width:210px;max-height:260px;
      overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:6px 0;z-index:200;display:none;box-shadow:0 4px 16px rgba(0,0,0,.5)}
    .ms-rep-dd.open{display:block}
    .ms-rep-dd label{display:flex;align-items:center;gap:8px;padding:5px 12px;
      font-size:.8rem;cursor:pointer;color:var(--text)}
    .ms-rep-dd label:hover{background:var(--surface2)}
    .ms-rep-dd .ms-all-opt{color:var(--muted);border-bottom:1px solid var(--border);
      padding-bottom:6px;margin-bottom:3px;font-style:italic}
    .ms-rep-dd input[type=checkbox]{accent-color:var(--blue);cursor:pointer;flex-shrink:0}

    .container{max-width:1100px;margin:0 auto;padding:var(--gap)}
    .error-banner{background:#2a1a1a;border:1px solid var(--red);border-radius:var(--radius);
      padding:10px 14px;color:var(--red);font-size:.85rem;margin-bottom:var(--gap);display:none}

    /* ── Section ── */
    .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      margin-bottom:var(--gap);overflow:hidden}
    .section-header{display:flex;align-items:center;gap:10px;padding:12px 16px;
      background:var(--surface2);border-bottom:1px solid var(--border)}
    .section-icon{font-size:1.1rem}
    .section-title{font-size:.9rem;font-weight:700}
    .section-sub{font-size:.75rem;color:var(--muted);margin-left:auto}

    /* ── Table rapport ── */
    .rapport-table{width:100%;border-collapse:collapse}
    .rapport-table th,.rapport-table td{padding:10px 14px;text-align:right;border-bottom:1px solid var(--border)}
    .rapport-table th:first-child,.rapport-table td:first-child{text-align:left;color:var(--muted);font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;width:180px}
    .rapport-table thead th{font-size:.75rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:var(--surface2)}
    .rapport-table thead th.col-n{color:var(--blue)}
    .rapport-table thead th.col-evol{color:var(--muted);font-size:.7rem}

    .val-main{font-size:.92rem;font-weight:600}
    .val-pct{font-size:.75rem;color:var(--muted);margin-left:4px}
    .val-pct.good{color:var(--green)}
    .val-pct.avg{color:var(--orange)}
    .val-pct.bad{color:var(--red)}
    .evol{font-size:.76rem;display:block;margin-top:2px}
    .evol.pos{color:var(--green)} .evol.neg{color:var(--red)} .evol.neu{color:var(--muted)}

    .row-ca td{border-bottom:2px solid var(--border)}
    .row-sf td,.row-af td{background:rgba(0,0,0,.12)}
    .row-sf td:first-child{padding-left:24px}
    .row-af td:first-child{padding-left:24px}

    tr.row-sep td{padding:0;height:6px;background:var(--bg);border:none}

    .skeleton{animation:pulse 1.4s ease-in-out infinite;background:var(--border);border-radius:4px;display:inline-block}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

    /* ── Graphique mensuel ── */
    .chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      margin-bottom:var(--gap);overflow:hidden}
    .chart-section-header{display:flex;align-items:center;gap:10px;padding:12px 16px;
      background:var(--surface2);border-bottom:1px solid var(--border)}
    .chart-section-title{font-size:.9rem;font-weight:700}
    .chart-section-sub{font-size:.75rem;color:var(--muted);margin-left:auto}
    .chart-wrap{padding:14px 16px}
    .chart-wrap canvas{max-height:280px}
  </style>
  <script>if(new URLSearchParams(location.search).get('embed')==='1')document.documentElement.classList.add('embedded');</script>
</head>
<body>

<header>
  <h1>📋 Rapport CA Global</h1>
  <a class="nav-link" href="/tb-reporting.html">← TB Reporting</a>
  <a class="nav-link" href="/rapport-commerciaux.html">👥 CA par Commercial</a>
  <a class="nav-link" href="/rapports.html">📋 Rapports</a>
  <a class="nav-link" href="/backoffice.html">⚙️ Backoffice</a>
  <a class="nav-link" href="/settings.html">Paramètres</a>
  <input type="date" id="sel-asof" title="Date du jour de référence (défaut : aujourd'hui)" onchange="load()">
  <select id="sel-annee" title="Année de référence" onchange="onAnneeChange()">
    <option value="ytd">YTD — Année en cours</option>
  </select>
  <select id="sel-glissant" title="Période glissante" onchange="load()">
    <option value="">— Glissant —</option>
    <option value="30">30 derniers jours</option>
    <option value="90">90 derniers jours</option>
    <option value="12m">12 derniers mois</option>
  </select>
  <label class="hdr-check" title="Afficher la section Aujourd'hui">
    <input type="checkbox" id="cb-today" checked onchange="toggleToday()"> Aujourd'hui
  </label>
  <div class="ms-rep" id="rep-wrap">
    <button type="button" class="ms-rep-btn" onclick="toggleRepDd()">
      <span id="rep-label">Tous les commerciaux</span>
    </button>
    <div class="ms-rep-dd" id="rep-dd">
      <label class="ms-all-opt">
        <input type="checkbox" id="rep-all" checked onchange="onRepAllChange()"> Tous les commerciaux
      </label>
    </div>
  </div>
  <select id="sel-actif" title="Filtre sur statut du commercial" autocomplete="off" onchange="onActifChange()">
    <option value="all" selected>Tous (actifs + inactifs)</option>
    <option value="O">Actifs seulement</option>
    <option value="N">Inactifs seulement</option>
  </select>
  <select id="sel-pr" title="Prix de revient utilisé pour le calcul de marge">
    <option value="PLVCRUMP">CRUMP (défaut)</option>
    <option value="PLVPRMP">PRMP</option>
    <option value="PLVLASTPR">Dernier PR</option>
  </select>
  <select id="sel-pa" title="Prix d'achat utilisé pour les montants d'achat">
    <option value="PLVLASTPA">Dernier PA (défaut)</option>
    <option value="PLVPMP">PMP</option>
    <option value="PLVCUMP">CUMP</option>
  </select>
  <div class="spacer"></div>
  <div class="hdr-right">
    <span id="status-dot"></span>
    <span id="last-update"></span>
    <button id="refresh-btn" onclick="load()">↻ Actualiser</button>
  </div>
</header>

<div class="container">
  <div id="error-banner" class="error-banner"></div>
  <div class="chart-section" id="chart-section" style="display:none">
    <div class="chart-section-header">
      <span class="section-icon">📈</span>
      <span class="chart-section-title">Évolution mensuelle CA HT</span>
      <span class="chart-section-sub" id="chart-subtitle"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-mensuel"></canvas></div>
  </div>
  <div id="sections"></div>
</div>

<script>
const API = '/api/commercial';
const LS_PR = 'tb_prix_revient';

// ── Multi-select commercial ──────────────────────────────────────
function toggleRepDd() {
  document.getElementById('rep-dd').classList.toggle('open');
}
function onRepAllChange() {
  const all = document.getElementById('rep-all').checked;
  document.querySelectorAll('#rep-dd input[type=checkbox]:not(#rep-all)').forEach(cb => { cb.checked = all; });
  updateRepLabel(); load();
}
function onRepChange() {
  const cbs = [...document.querySelectorAll('#rep-dd input[type=checkbox]:not(#rep-all)')];
  document.getElementById('rep-all').checked = cbs.every(c => c.checked);
  updateRepLabel(); load();
}
function updateRepLabel() {
  const checked = [...document.querySelectorAll('#rep-dd input[type=checkbox]:not(#rep-all):checked')];
  const total   = document.querySelectorAll('#rep-dd input[type=checkbox]:not(#rep-all)').length;
  document.getElementById('rep-label').textContent =
    (!total || checked.length === total) ? 'Tous les commerciaux'
    : checked.length === 0 ? 'Aucun commercial'
    : `${checked.length} commercial${checked.length > 1 ? 'aux' : ''}`;
}
function getSelectedReps() {
  const checked = [...document.querySelectorAll('#rep-dd input[type=checkbox]:not(#rep-all):checked')];
  const total   = document.querySelectorAll('#rep-dd input[type=checkbox]:not(#rep-all)').length;
  if (!total || checked.length === total) return '';
  return checked.map(cb => cb.value).join(',');
}
document.addEventListener('click', e => {
  if (!document.getElementById('rep-wrap').contains(e.target))
    document.getElementById('rep-dd').classList.remove('open');
});

function qs(id) { return document.getElementById(id); }
function fmt(n, dec=0) {
  if (n===null||n===undefined||isNaN(n)) return '—';
  return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:dec,maximumFractionDigits:dec}).format(n);
}
function pct(v, ca) { return ca > 0 ? v / ca * 100 : null; }
function evolPct(n, ref) { return ref > 0 ? (n - ref) / ref * 100 : null; }

function pctClass(p) {
  if (p === null) return '';
  if (p >= 30) return 'good';
  if (p >= 20) return 'avg';
  return 'bad';
}

function evolHtml(n, ref) {
  const e = evolPct(n, ref);
  const delta = (typeof n === 'number' && typeof ref === 'number') ? (n - ref) : null;
  if (e === null && delta === null) return '';
  const cls = (e ?? delta) >= 0 ? 'pos' : 'neg';
  const arrow = (e ?? delta) >= 0 ? '▲' : '▼';
  const sign = (delta ?? 0) >= 0 ? '+' : '';
  const deltaStr = delta !== null ? `${sign}${fmt(delta)} €` : '';
  const pctStr   = e     !== null ? `${e >= 0 ? '+' : ''}${fmt(e,1)} %` : '';
  const inner = [deltaStr, pctStr].filter(Boolean).join(' · ');
  return `<span class="evol ${cls}">${arrow} ${inner}</span>`;
}

function cellCA(val, ref) {
  const e = ref !== undefined ? evolHtml(ref, val) : '';
  return `<td><span class="val-main">${fmt(val)} €</span>${e}</td>`;
}

function cellMarge(val, ca) {
  const p = pct(val, ca);
  const pStr = p !== null ? `<span class="val-pct ${pctClass(p)}">${fmt(p,1)} %</span>` : '';
  return `<td><span class="val-main">${fmt(val)} €</span>${pStr}</td>`;
}

function renderSection(title, icon, subtitle, data, annees, anneesLabel) {
  const labels = anneesLabel || annees;
  const [n, n1, n2] = labels;
  const ca = data.ca, sf = data.mgsf, af = data.mgaf;

  return `
  <div class="section">
    <div class="section-header">
      <span class="section-icon">${icon}</span>
      <span class="section-title">${title}</span>
      <span class="section-sub">${subtitle}</span>
    </div>
    <table class="rapport-table">
      <thead>
        <tr>
          <th></th>
          <th class="col-n">${n} <small>(N)</small></th>
          <th>${n1} <small>(N-1)</small></th>
          <th class="col-evol">Évol N/N-1</th>
          <th>${n2} <small>(N-2)</small></th>
          <th class="col-evol">Évol N/N-2</th>
        </tr>
      </thead>
      <tbody>
        <tr class="row-ca">
          <td>CA HT</td>
          <td><span class="val-main">${fmt(ca[0])} €</span></td>
          <td><span class="val-main">${fmt(ca[1])} €</span></td>
          <td>${evolHtml(ca[0], ca[1])}</td>
          <td><span class="val-main">${fmt(ca[2])} €</span></td>
          <td>${evolHtml(ca[0], ca[2])}</td>
        </tr>
        <tr class="row-sf">
          <td>Marge brute (sans frais)</td>
          ${cellMarge(sf[0], ca[0])}
          ${cellMarge(sf[1], ca[1])}
          <td>${evolHtml(sf[0], sf[1])}</td>
          ${cellMarge(sf[2], ca[2])}
          <td>${evolHtml(sf[0], sf[2])}</td>
        </tr>
        <tr class="row-af">
          <td>Marge nette (avec frais)</td>
          ${cellMarge(af[0], ca[0])}
          ${cellMarge(af[1], ca[1])}
          <td>${evolHtml(af[0], af[1])}</td>
          ${cellMarge(af[2], ca[2])}
          <td>${evolHtml(af[0], af[2])}</td>
        </tr>
      </tbody>
    </table>
  </div>`;
}

function skeleton() {
  const showToday = qs('cb-today').checked;
  const hasGlissant = !!qs('sel-glissant')?.value;
  const titles = [
    ...(showToday ? ['Aujourd\'hui'] : []),
    'Mois en cours',
    ...(hasGlissant ? ['Période glissante'] : []),
    'Année en cours',
  ];
  return titles.map(t => `
    <div class="section">
      <div class="section-header">
        <span class="section-title">${t}</span>
      </div>
      <table class="rapport-table">
        <tbody>
          ${['CA HT','Marge brute','Marge nette'].map(() => `
            <tr><td style="width:180px">&nbsp;</td>
            ${[1,2,3,4,5].map(() => `<td><span class="skeleton" style="width:80px;height:16px">&nbsp;</span></td>`).join('')}
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`).join('');
}

function onAnneeChange() {
  load();
}

async function onActifChange() {
  // Recharger la liste des commerciaux selon le filtre actif, puis relancer les données
  await reloadCommerciaux();
  load();
}

function renderCommerciaux(list) {
  const dd = qs('rep-dd');
  // Garde uniquement l'option "Tous" en tête
  [...dd.querySelectorAll('label:not(.ms-all-opt)')].forEach(l => l.remove());
  (list || []).forEach(c => {
    const lbl = document.createElement('label');
    lbl.innerHTML = `<input type="checkbox" value="${c.TIRID}" checked onchange="onRepChange()"> ${c.nom.replace(/</g,'&lt;')}`;
    dd.appendChild(lbl);
  });
  // Réinitialiser l'état "Tous coché"
  document.getElementById('rep-all').checked = true;
  updateRepLabel();
}

async function reloadCommerciaux() {
  const actifQS = qs('sel-actif')?.value || 'all';
  try {
    const data = await fetch(`${API}/filters?actif=${encodeURIComponent(actifQS)}`).then(r => r.json());
    renderCommerciaux(data.commerciaux);
  } catch {}
}

function toggleToday() {
  const show = qs('cb-today').checked;
  const el = document.getElementById('section-jour');
  if (el) el.style.display = show ? '' : 'none';
}

async function initFilters() {
  // Priority: URL param > localStorage > server default
  const urlPr = new URLSearchParams(location.search).get('pr');
  if (urlPr) {
    qs('sel-pr').value = urlPr;
  } else {
    const saved = localStorage.getItem(LS_PR);
    if (saved) {
      qs('sel-pr').value = saved;
    } else {
      try {
        const cfg = await fetch('/api/settings').then(r => r.json());
        if (cfg.calcul?.pr) qs('sel-pr').value = cfg.calcul.pr;
      } catch {}
    }
  }
  qs('sel-pr').onchange = () => { localStorage.setItem(LS_PR, qs('sel-pr').value); load(); };
  if (qs('sel-pa')) qs('sel-pa').onchange = () => load();

  // Filtre actif : si la page est embarquée (dashboard), respecter le param URL ;
  // sinon défaut "Tous". On set explicitement la valeur pour éviter l'autofill <select>
  // que le navigateur peut restaurer entre deux navigations.
  const urlActif = new URLSearchParams(location.search).get('actif');
  const initActif = (urlActif === 'O' || urlActif === 'N' || urlActif === 'all') ? urlActif : 'all';
  if (qs('sel-actif')) qs('sel-actif').value = initActif;
  const actifQS = initActif;

  const data = await fetch(`${API}/filters?actif=${encodeURIComponent(actifQS)}`).then(r => r.json());

  // Exercice en cours
  const today = new Date();
  const p2 = n => String(n).padStart(2,'0');
  const todayStr = `${today.getFullYear()}-${p2(today.getMonth()+1)}-${p2(today.getDate())}`;
  const curExe = (data.exercices||[]).find(e => e.date_debut <= todayStr && todayStr <= e.date_fin);

  // Sélecteur d'année : YTD exercice en tête, YTD calendaire, puis années complètes
  const selAn = qs('sel-annee');
  const curY = new Date().getFullYear();
  const pastAnnees = data.annees.filter(a => a < curY);
  let anHtml = '';
  if (data.exercices?.length) {
    anHtml += '<optgroup label="YTD exercice">';
    data.exercices.forEach(e => {
      const isCur = curExe && e.date_debut === curExe.date_debut;
      anHtml += `<option value="ytd_exe:${e.date_debut}:${e.date_fin}"${isCur?' selected':''}>YTD ${e.libelle || e.annee_debut}${isCur?' (en cours)':''}</option>`;
    });
    anHtml += '</optgroup>';
  }
  anHtml += `<option value="ytd"${curExe?'':' selected'}>YTD calendaire — ${curY} (jusqu'à aujourd'hui)</option>`;
  anHtml += `<option value="${curY}">${curY} — Année complète</option>`;
  if (pastAnnees.length) {
    anHtml += '<optgroup label="Années calendaires">';
    pastAnnees.forEach(a => { anHtml += `<option value="${a}">${a}</option>`; });
    anHtml += '</optgroup>';
  }
  if (data.exercices?.length) {
    anHtml += '<optgroup label="Exercices fiscaux (complets)">';
    data.exercices.forEach(e => {
      anHtml += `<option value="exe:${e.date_debut}:${e.date_fin}">${e.libelle || e.annee_debut}</option>`;
    });
    anHtml += '</optgroup>';
  }
  selAn.innerHTML = anHtml;

  // Multi-select commercial
  renderCommerciaux(data.commerciaux);

  // Params URL quand page embarquée dans un iframe
  const p = new URLSearchParams(location.search);
  const anneeP = p.get('annee') || '';
  if (anneeP.startsWith('ytd_exe:') || anneeP.startsWith('exe:') || anneeP === 'ytd' || /^\d+$/.test(anneeP)) {
    // Priorité à annee si elle porte un marqueur explicite (ytd_exe/exe/ytd/année calendaire)
    selAn.value = anneeP; onAnneeChange();
  } else if (p.get('date_debut') && p.get('date_fin')) {
    // Période glissante transmise par le dashboard (30j/90j/12m) — créer une option virtuelle exe:
    const d0 = p.get('date_debut'), d1 = p.get('date_fin');
    const exeVal = `exe:${d0}:${d1}`;
    if (![...selAn.options].find(o => o.value === exeVal)) {
      const opt = document.createElement('option');
      opt.value = exeVal; opt.textContent = `${d0} → ${d1}`;
      selAn.appendChild(opt);
    }
    selAn.value = exeVal; onAnneeChange();
  } else if (p.get('annee')) {
    selAn.value = p.get('annee'); onAnneeChange();
  }
  if (p.get('today') === '0') { qs('cb-today').checked = false; }
  if (p.get('pr'))    qs('sel-pr').value   = p.get('pr');
  if (p.get('pa') && qs('sel-pa')) qs('sel-pa').value = p.get('pa');
  // Date du jour de référence : URL > aujourd'hui réel
  if (qs('sel-asof')) qs('sel-asof').value = p.get('asof') || todayStr;
  // On ignore volontairement l'éventuel param URL repid (vient du dashboard)
  // pour que la page conserve son défaut "Tous les commerciaux" indépendamment
  // de l'embed iframe.
}

async function load() {
  const btn = qs('refresh-btn');
  const dot = qs('status-dot');
  const banner = qs('error-banner');
  btn.disabled = true; btn.textContent = '…';
  qs('sections').innerHTML = skeleton();

  const repid    = getSelectedReps();
  const pr       = qs('sel-pr').value;
  const pa       = qs('sel-pa')?.value || 'PLVLASTPA';
  const annee    = qs('sel-annee').value;
  const glissant = qs('sel-glissant').value;
  const actif    = qs('sel-actif')?.value || 'all';
  const asof     = qs('sel-asof')?.value || '';
  const full     = annee !== 'ytd' && !annee.startsWith('ytd_exe:');
  const params   = new URLSearchParams();
  if (repid)    params.set('repid', repid);
  if (pr)       params.set('pr', pr);
  if (pa)       params.set('pa', pa);
  if (annee)    params.set('annee', annee);
  if (full)     params.set('full', '1');
  if (glissant) params.set('glissant', glissant);
  if (actif)    params.set('actif', actif);
  if (asof)     params.set('asof', asof);
  const dbsP = new URLSearchParams(location.search).get('dbs');
  if (dbsP)     params.set('dbs', dbsP);
  const qs_ = params.toString() ? '?' + params.toString() : '';

  try {
    const data = await fetch(`${API}/rapport-ca${qs_}`).then(r => r.json());
    if (data.error) throw new Error(data.error);

    const MOIS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    const todayDate = new Date(data.today + 'T00:00:00');
    const nomMois   = MOIS_FR[todayDate.getMonth()];
    const anneeRef  = data.annees[0];
    const todayFmt  = formatDate(data.today);

    const prLabel = { PLVCRUMP: 'CRUMP', PLVPRMP: 'PRMP', PLVLASTPR: 'Dernier PR' }[pr] || 'CRUMP';
    const prSub = `· PR : ${prLabel}`;

    const periodeASub = data.isYtdExe
      ? `Exercice YTD — du ${formatDate(data.dateDebut)} au ${formatDate(data.dateFin)} ${prSub}`
      : data.isFull
      ? `${anneeRef} — du ${formatDate(data.dateDebut)} au ${formatDate(data.dateFin)} ${prSub}`
      : `${anneeRef} — du ${formatDate(data.dateDebut)} au ${todayFmt} (YTD) ${prSub}`;

    const showToday = qs('cb-today').checked;
    const jourHtml = `<div id="section-jour" style="display:${showToday ? '' : 'none'}">` +
      renderSection('Aujourd\'hui', '📅', `${todayFmt} ${prSub}`, data.jour, data.annees) +
      `</div>`;

    const glissantHtml = data.glissant ? renderSection(
      data.glissantLabel, '🔄',
      `du ${formatDate(data.glissantDebut)} au ${formatDate(data.glissantFin)} ${prSub}`,
      data.glissant, data.annees_g
    ) : '';

    qs('sections').innerHTML =
      jourHtml +
      renderSection(
        'Mois en cours', '📆',
        `${nomMois} ${anneeRef} — du ${formatDate(data.today.slice(0,8) + '01')} au ${formatDate(data.moisFin)} ${prSub}`,
        data.mois, data.annees, null   // mois = calendaire
      ) +
      glissantHtml +
      renderSection(
        data.isYtdExe ? 'Exercice en cours (YTD)' : 'Année en cours', '📊',
        periodeASub,
        data.annee, data.annees, data.anneesLabel
      );

    dot.className = 'ok';
    banner.style.display = 'none';
    qs('last-update').textContent = new Date().toLocaleTimeString('fr-FR');

    // Passer la valeur brute du sélecteur (exe:..., ytd_exe:..., ou année numérique)
    // pour que /mensuel respecte les bornes de l'exercice fiscal
    loadMensuel(qs('sel-annee').value || anneeRef, '', getSelectedReps());
  } catch (err) {
    dot.className = 'err';
    banner.style.display = 'block';
    banner.textContent = 'Erreur : ' + err.message;
    qs('sections').innerHTML = '';
  } finally {
    btn.disabled = false; btn.textContent = '↻ Actualiser';
  }
}

let chartMensuel = null;

async function loadMensuel(annee, mois, repid) {
  const params = new URLSearchParams();
  if (annee) params.set('annee', annee);
  if (mois)  params.set('mois', mois);
  if (repid) params.set('repid', repid);
  const actif = qs('sel-actif')?.value || 'all';
  if (actif) params.set('actif', actif);
  const dbsP = new URLSearchParams(location.search).get('dbs');
  if (dbsP)  params.set('dbs', dbsP);
  const qs_ = params.toString() ? '?' + params.toString() : '';
  try {
    const data = await fetch(`${API}/mensuel${qs_}`).then(r => r.json());
    if (data.error || !data.months?.length) { qs('chart-section').style.display='none'; return; }

    qs('chart-section').style.display = '';
    qs('chart-subtitle').textContent = `${data.periodeLabel} vs ${data.n1Label}`;

    const totalN  = data.months.reduce((s,m) => s + (m.n  || 0), 0);
    const totalN1 = data.months.reduce((s,m) => s + (m.n1 || 0), 0);
    const canvasEl = qs('chart-mensuel');
    const parent   = canvasEl.parentNode;
    const prevMsg  = parent.querySelector('.no-data');
    if (prevMsg) prevMsg.remove();
    if (totalN === 0 && totalN1 === 0) {
      canvasEl.style.display = 'none';
      if (chartMensuel) { chartMensuel.destroy(); chartMensuel = null; }
      const p = document.createElement('p');
      p.className = 'no-data';
      p.style.cssText = 'color:var(--muted);font-size:.82rem;padding:30px 0;text-align:center';
      p.textContent = 'Aucune donnée pour la période et les commerciaux sélectionnés';
      parent.appendChild(p);
      return;
    }
    canvasEl.style.display = '';

    const ctx = qs('chart-mensuel').getContext('2d');
    if (chartMensuel) { chartMensuel.destroy(); chartMensuel = null; }
    chartMensuel = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.months.map(m => m.label),
        datasets: [
          { label: formatDatesInLabel(data.periodeLabel),
            data: data.months.map(m => m.n),
            backgroundColor: 'rgba(33,150,243,.8)', borderColor: '#2196F3', borderWidth: 1 },
          { label: formatDatesInLabel(data.n1Label),
            data: data.months.map(m => m.n1),
            backgroundColor: 'rgba(136,146,164,.45)', borderColor: '#8892a4', borderWidth: 1 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          legend: { labels: { color: '#e2e8f0', font: { size: 11 } } },
          tooltip: { callbacks: { label: c => ` ${c.dataset.label} : ${new Intl.NumberFormat('fr-FR').format(c.raw)} €` } }
        },
        scales: {
          x: { ticks: { color: '#8892a4' }, grid: { color: '#2a2d3e' } },
          y: { ticks: { color: '#8892a4', callback: v => new Intl.NumberFormat('fr-FR').format(v) + ' €' }, grid: { color: '#2a2d3e' } }
        }
      }
    });
  } catch { qs('chart-section').style.display='none'; }
}

initFilters().then(load);
