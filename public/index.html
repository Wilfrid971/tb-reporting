<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tableau de bord</title>
  <script src="/auth-client.js"></script>
  <script>AUTH.require("dashboard"); AUTH.installFetchInterceptor();</script>
  <script src="/theme.js"></script>
  <script src="/vendor/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --accent: #2196F3;
      --radius: 12px;
      --gap: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #666; display: inline-block; margin-right: 6px;
    }
    #status-dot.ok { background: #4CAF50; }
    #status-dot.error { background: #F44336; }
    #last-update { font-size: 0.75rem; color: var(--text-muted); }
    #refresh-btn {
      background: var(--accent); border: none; color: #fff;
      padding: 6px 14px; border-radius: 6px; font-size: 0.8rem;
      cursor: pointer; white-space: nowrap;
    }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .container { padding: var(--gap); max-width: 1200px; margin: 0 auto; }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: var(--gap);
      margin-bottom: var(--gap);
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px;
      border-left: 4px solid var(--accent);
    }
    .kpi-card .kpi-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .kpi-card .kpi-value { font-size: 1.6rem; font-weight: 700; line-height: 1.1; }
    .kpi-card .kpi-unit { font-size: 0.85rem; color: var(--text-muted); margin-left: 2px; }
    .kpi-card.loading .kpi-value { color: var(--text-muted); }
    .kpi-card.error-card { border-left-color: #F44336; }
    .kpi-card.error-card .kpi-value { font-size: 0.8rem; color: #F44336; }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--gap);
    }
    @media (min-width: 768px) {
      .chart-grid { grid-template-columns: 1fr 1fr; }
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .chart-card h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
    .chart-card canvas { max-height: 250px; }

    .skeleton { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

    .error-banner {
      background: #2a1a1a; border: 1px solid #F44336;
      border-radius: var(--radius); padding: 12px 16px;
      color: #F44336; font-size: 0.85rem; margin-bottom: var(--gap);
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center">
      <span id="status-dot"></span>
      <h1>Tableau de bord</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="last-update"></span>
      <button id="refresh-btn" onclick="loadDashboard()">↻ Actualiser</button>
    </div>
  </header>

  <div class="container">
    <div id="error-banner" class="error-banner"></div>
    <div id="kpi-grid" class="kpi-grid"></div>
    <div id="chart-grid" class="chart-grid"></div>
  </div>

  <script>
    function cssVar(name, fallback){ const v=getComputedStyle(document.documentElement).getPropertyValue(name).trim(); return v||fallback||''; }

    const API = '/api/dashboard';
    const charts = {};
    let refreshTimer = null;

    const CHART_TYPES = ['chart_bar', 'chart_bar_horizontal', 'chart_line', 'chart_pie'];

    function formatValue(val, format) {
      if (val === null || val === undefined) return '—';
      const n = parseFloat(val);
      if (isNaN(n)) return val;
      if (format === 'currency') return new Intl.NumberFormat('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
      if (format === 'integer') return new Intl.NumberFormat('fr-FR').format(Math.round(n));
      return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 2 }).format(n);
    }

    function hexAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function renderValueKpis(kpis) {
      const grid = document.getElementById('kpi-grid');
      const valueKpis = kpis.filter(k => !CHART_TYPES.includes(k.type));
      if (!valueKpis.length) { grid.style.display = 'none'; return; }
      grid.innerHTML = valueKpis.map(kpi => {
        const val = kpi.error ? `Erreur` : (kpi.data?.[0]?.valeur ?? '—');
        const display = kpi.error ? 'Erreur' : formatValue(val, kpi.format);
        return `<div class="kpi-card ${kpi.error ? 'error-card' : ''}" style="border-left-color:${kpi.color}">
          <div class="kpi-label">${kpi.label}</div>
          <div class="kpi-value">${display}<span class="kpi-unit">${kpi.unit}</span></div>
        </div>`;
      }).join('');
    }

    function renderCharts(kpis) {
      const grid = document.getElementById('chart-grid');
      const chartKpis = kpis.filter(k => CHART_TYPES.includes(k.type));
      if (!chartKpis.length) { grid.style.display = 'none'; return; }

      chartKpis.forEach(kpi => {
        let card = document.getElementById(`chart-${kpi.id}`);
        if (!card) {
          card = document.createElement('div');
          card.className = 'chart-card';
          card.id = `chart-${kpi.id}`;
          card.innerHTML = `<h3>${kpi.label}</h3><canvas id="canvas-${kpi.id}"></canvas>`;
          grid.appendChild(card);
        }

        if (kpi.error || !kpi.data?.length) {
          card.querySelector('canvas').replaceWith(Object.assign(document.createElement('p'), { textContent: kpi.error || 'Aucune donnée', style: 'color:var(--text-muted);font-size:0.85rem;padding:20px 0' }));
          return;
        }

        const labels = kpi.data.map(r => r.label);
        const values = kpi.data.map(r => parseFloat(r.valeur) || 0);
        const ctx = document.getElementById(`canvas-${kpi.id}`)?.getContext('2d');
        if (!ctx) return;

        if (charts[kpi.id]) charts[kpi.id].destroy();

        const isHorizontal = kpi.type === 'chart_bar_horizontal';
        charts[kpi.id] = new Chart(ctx, {
          type: kpi.type === 'chart_line' ? 'line' : kpi.type === 'chart_pie' ? 'doughnut' : 'bar',
          data: {
            labels,
            datasets: [{
              label: kpi.label,
              data: values,
              backgroundColor: kpi.type === 'chart_pie'
                ? values.map((_, i) => `hsl(${i * 37},65%,55%)`)
                : hexAlpha(kpi.color, 0.7),
              borderColor: kpi.color,
              borderWidth: kpi.type === 'chart_line' ? 2 : 1,
              fill: kpi.type === 'chart_line',
              tension: 0.3,
            }],
          },
          options: {
            indexAxis: isHorizontal ? 'y' : 'x',
            responsive: true,
            maintainAspectRatio: true,
            plugins: { legend: { display: false } },
            scales: kpi.type === 'chart_pie' ? {} : {
              x: { ticks: { color: cssVar('--muted'), maxRotation: 45 }, grid: { color: cssVar('--border') } },
              y: { ticks: { color: cssVar('--muted'), callback: v => formatValue(v, kpi.format) }, grid: { color: cssVar('--border') } },
            },
          },
        });
      });
    }

    async function loadDashboard() {
      const btn = document.getElementById('refresh-btn');
      const dot = document.getElementById('status-dot');
      const banner = document.getElementById('error-banner');
      btn.disabled = true;
      btn.textContent = '…';

      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        dot.className = 'ok';
        banner.style.display = 'none';

        renderValueKpis(data.kpis);
        renderCharts(data.kpis);

        const d = new Date(data.generatedAt);
        document.getElementById('last-update').textContent = d.toLocaleTimeString('fr-FR');

        if (refreshTimer) clearTimeout(refreshTimer);
        if (data.refreshInterval > 0) {
          refreshTimer = setTimeout(loadDashboard, data.refreshInterval * 1000);
        }
      } catch (err) {
        dot.className = 'error';
        banner.style.display = 'block';
        banner.textContent = `Erreur de connexion : ${err.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = '↻ Actualiser';
      }
    }

    loadDashboard();
  </script>
</body>
</html>
